# Serveur
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/warroom
spring.datasource.username=warroom
spring.datasource.password=warroom
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Sķcuritķ de l'enr¶lement (Pre-Shared Key)
warroom.enrollment.secret=warroom-jee-secret-2026

# Session timeout (30 minutes d'inactivitķ)
server.servlet.session.timeout=30m